name: Robotny.aic
version: 1.2.0
logs_dir: logs/
site: scpfoundation.net

commands:
  search:
    description: 
      default: Search in SCP Foundation database
      localizations:
        ru: Поиск по базе данных SCP Foundation
    arguments:
      query:
        description: 
          default: Search query
          localizations:
            ru: Поисковой запрос

search:
  lang: ru
  timeout: 3
  engine_id: 53cb25b3bc1374c12 # cx google search id
  report:
    title: Вот, что мне удалось найти
    error_message: Я обыскал всё вдоль и поперек, но ничего так и не нашел
    embed_color: 0xb37553
  stuck_messages:
   - Ты меня за дурака держишь?)
   - И что я должен с этим делать?
   - Да ну, а дальше что было?

gratitudes:
  match: (?i)роботн
  reactions:
    - ❤️ # :heart:
    - 💖 # :sparkling_heart:
    - 👌 # :ok_hand: 
    - 🤟 # :love_you_gesture:
    - 🦾 # :mechanical_arm:
    - 💓 # :heartbeat:
    - 🦊 # :fox:
    - ❤️‍🔥 # :heart_on_fire:
    - 🤝 # :handshake:

roles:
  newkek: Не назначен

servers:
  accepted:
    -
  restricted:
    -

punctuassery:
  reason: Учись общаться нормально
  match: |
    [.,:;\-+'"]+
